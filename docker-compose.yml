version: "3.9"

services:
  api:
    build: .
    container_name: extractive_qa_api
    ports:
      - "8000:8000"
    environment:
      PYTHONPATH: /app/src
      MLRUNS_DIR: /app/artifacts/mlruns

  ui:
    image: python:3.11-slim
    container_name: extractive_qa_ui
    working_dir: /app
    volumes:
      - ./:/app
    command: >
      sh -c "pip install --no-cache-dir streamlit requests &&
             streamlit run ui/streamlit_app.py --server.address 0.0.0.0 --server.port 8501"
    environment:
      API_URL: http://api:8000
    ports:
      - "8501:8501"
    depends_on:
      - api